services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-industrial_fault_tree_ai}
    ports: ["3306:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_PASSWORD:-root123456}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.6
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ingest.geoip.downloader.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
    ports: ["9200:9200"]
    volumes: ["es_data:/usr/share/elasticsearch/data"]
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes: ["etcd_data:/etcd"]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: minio server /minio_data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/minio_data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30

  milvus:
    image: milvusdb/milvus:v2.6.1
    command: ["milvus", "run", "standalone"]
    ports: ["19530:19530", "9091:9091"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes: ["milvus_data:/var/lib/milvus"]
    depends_on:
      etcd: { condition: service_started }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build: { context: ./app/backend }
    env_file:
      - ./.env
    environment:
      MYSQL_DSN: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-industrial_fault_tree_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MILVUS_URL: http://milvus:19530
      AI_MODEL: ${AI_MODEL:-qwen3.7-max}
      DOCUMENT_ROOT: /data/documents
    ports: ["8080:8080"]
    volumes: ["document_data:/data/documents"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      milvus: { condition: service_healthy }

  frontend:
    build:
      context: ./app/frontend
    ports: ["8000:80"]
    depends_on: [backend]

volumes:
  mysql_data:
  redis_data:
  es_data:
  etcd_data:
  minio_data:
  milvus_data:
  document_data:
