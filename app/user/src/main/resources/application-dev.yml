spring:
  datasource:
    url: ${MYSQL_DSN:jdbc:mysql://127.0.0.1:3306/industrial_fault_tree_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${USER_METRICS_PORT:9995}

grpc:
  server:
    port: ${USER_GRPC_PORT:9091}
    advertise-host: ${CONSUL_SERVICE_HOST:127.0.0.1}

consul:
  address: ${CONSUL_ADDRESS:}

observability:
  prometheus:
    advertise-host: ${CONSUL_SERVICE_HOST:127.0.0.1}

management:
  otlp:
    tracing:
      endpoint: http://127.0.0.1:4318/v1/traces
