kitex:
  service: "document"
  address: ":8888"
  log_level: info
  log_file_name: "log/kitex.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50

registry:
  registry_address:
    - 127.0.0.1:8500
  username: ""
  password: ""

mysql:
  dsn: "gorm:gorm@tcp(127.0.0.1:3306)/gorm?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  address: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0

es:
  addresses:
    - "http://127.0.0.1:9200"
  index: "document_chunks"
  username: ""
  password: ""

milvus:
  address: "127.0.0.1:19530"
  collection: "document_chunks"
  vector_dim: 1536
  username: ""
  password: ""

index:
  task_chunk_size: 200
  embedding_batch_size: 25
  write_batch_size: 200
  min_workers: 1
  max_workers: 8
  queue_size: 256
  scale_up_threshold: 4
  scale_down_threshold: 0
  idle_timeout_seconds: 30
