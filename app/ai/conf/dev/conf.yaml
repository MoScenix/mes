kitex:
  service: "ai"
  address: ":8888"
  log_level: warn
  log_file_name: "log/kitex.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50

registry:
  registry_address:
    - 127.0.0.1:2379
  username: ""
  password: ""

mysql:
  dsn: "gorm:gorm@tcp(127.0.0.1:3306)/gorm?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  address: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0

llm:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model_name: "qwen3.7-max"
  timeout_seconds: 120
  max_tokens: 8192
  max_retries: 2
  temperature: 0.7
  top_p: 0.7

ShareDir:
  share_dir: /static/project/

workpool:
  min_workers: 1
  max_workers: 4
  queue_size: 128
  scale_up_threshold: 4
  scale_down_threshold: 0
  idle_timeout_seconds: 30
