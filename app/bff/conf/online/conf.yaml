hertz:
  service: "bff"
  address: ":8080"
  max_request_body_size: 209715200
  enable_pprof: false
  enable_gzip: true
  log_level: warn
  log_file_name: "log/hertz.log"
  log_max_size: 10
  log_max_age: 3
  log_max_backups: 50

mysql:
  dsn: "gorm:gorm@tcp(127.0.0.1:3306)/gorm?charset=utf8mb4&parseTime=True&loc=Local"

redis:
  address: "redis:6379"
  username: ""
  password: ""
  db: 0
consul:
  address: "consul:8500"

static:
  route: "/static"
  root: "/static"
  url_prefix: "/static"
  project: "project"
  avatar: "avatar"
  cover: "cover"

deploy:
  root: "/static/deploy"
  url_prefix: "/static/deploy"

file:
  big_threshold_bytes: 12000
  chunk_min_size: 200
  chunk_max_size: 400
