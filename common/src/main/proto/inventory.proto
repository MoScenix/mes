syntax = "proto3";

package inventory;

option go_package = "inventory";
option java_multiple_files = true;
option java_package = "com.moscenix.mes.grpc.inventory";
option java_outer_classname = "InventoryProto";

enum FlowType {
  FLOW_TYPE_UNKNOWN = 0;
  FLOW_TYPE_IN = 1;
  FLOW_TYPE_OUT = 2;
}

enum FlowStatus {
  FLOW_STATUS_UNKNOWN = 0;
  FLOW_STATUS_DRAFT = 1;
  FLOW_STATUS_SUBMITTED = 2;
  FLOW_STATUS_APPROVED = 3;
  FLOW_STATUS_REJECTED = 4;
}

enum StockStatus {
  STOCK_STATUS_UNKNOWN = 0;
  STOCK_STATUS_IN_STOCK = 1;
  STOCK_STATUS_RESERVED = 2;
  STOCK_STATUS_OUT_STOCK = 3;
}

enum QualityStatus {
  QUALITY_STATUS_UNKNOWN = 0;
  QUALITY_STATUS_PENDING = 1;
  QUALITY_STATUS_QUALIFIED = 2;
  QUALITY_STATUS_UNQUALIFIED = 3;
}

enum DraftStatus {
  DRAFT_STATUS_UNKNOWN = 0;
  DRAFT_STATUS_DRAFT = 1;
  DRAFT_STATUS_SUBMITTED = 2;
  DRAFT_STATUS_DONE = 3;
}

enum ListScope {
  LIST_SCOPE_UNSPECIFIED = 0;
  LIST_SCOPE_MINE = 1;
  LIST_SCOPE_ALL = 2;
  LIST_SCOPE_AUDIT = 3;
  LIST_SCOPE_BY_PROCESS = 4;
}

message ItemInfo {
  int64 id = 1;
  string name = 2;
  string unit = 3;
  string description = 4;
  int64 totalCount = 5;
  int64 inStockCount = 6;
  int64 reservedCount = 7;
  int64 outStockCount = 8;
  int64 pendingCount = 9;
  int64 qualifiedCount = 10;
  int64 unqualifiedCount = 11;
  int64 availableCount = 12;
  string createTime = 13;
  string updateTime = 14;
}

message ProcessItemInfo {
  int64 id = 1;
  int64 processId = 2;
  int64 consumeItemId = 3;
  int64 quantity = 4;
  ItemInfo consumeItem = 5;
}

message ProcessInfo {
  int64 id = 1;
  int64 itemId = 2;
  int64 ownerUserId = 3;
  string name = 4;
  string description = 5;
  DraftStatus status = 6;
  ItemInfo item = 7;
  repeated ProcessItemInfo items = 8;
  string createTime = 9;
  string updateTime = 10;
}

message ItemUnitInfo {
  int64 id = 1;
  int64 itemId = 2;
  StockStatus stockStatus = 3;
  QualityStatus qualityStatus = 4;
  string description = 5;
  string createTime = 6;
  string updateTime = 7;
  int64 engineeringOrderId = 8;
}

message EngineeringOrderInfo {
  int64 id = 1;
  int64 leaderUserId = 2;
  int64 itemId = 3;
  ItemInfo item = 4;
  int64 expectedQuantity = 5;
  int64 qualifiedQuantity = 6;
  int64 producedQuantity = 7;
  string description = 8;
  repeated ItemUnitInfo itemUnits = 9;
  string createTime = 10;
  string updateTime = 11;
  int64 processId = 12;
  ProcessInfo process = 13;
  DraftStatus status = 14;
  int64 unqualifiedQuantity = 15;
  string name = 16;
}

message InventoryFlowItemInfo {
  int64 id = 1;
  int64 inventoryFlowId = 2;
  int64 itemId = 3;
  int64 applyQuantity = 4;
  int64 finishedQuantity = 5;
  ItemInfo item = 6;
}

message InventoryFlowInfo {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  FlowType flowType = 4;
  FlowStatus flowStatus = 5;
  string description = 6;
  int64 approvedBy = 7;
  string approvedAt = 8;
  repeated InventoryFlowItemInfo items = 9;
  repeated ItemUnitInfo itemUnits = 10;
  string createTime = 11;
  string updateTime = 12;
  string name = 13;
}

message AddItemReq {
  string name = 1;
  string unit = 2;
  string description = 3;
}

message AddItemResp {
  int64 id = 1;
}

message UpdateItemReq {
  int64 id = 1;
  string name = 2;
  string unit = 3;
  string description = 4;
}

message UpdateItemResp {
  bool success = 1;
}

message GetItemReq {
  int64 id = 1;
}

message GetItemResp {
  ItemInfo item = 1;
}

message ListItemReq {
  int64 pageNum = 1;
  int64 pageSize = 2;
  string namePrefix = 3;
  string cursorUpdatedAt = 4;
  int64 cursorId = 5;
}

message ListItemResp {
  repeated ItemInfo itemList = 1;
  int64 total = 2;
  bool hasMore = 3;
  string nextCursorUpdatedAt = 4;
  int64 nextCursorId = 5;
}

message ProcessItemReq {
  int64 consumeItemId = 1;
  int64 quantity = 2;
}

message CreateProcessDraftReq {
  int64 ownerUserId = 1;
  int64 itemId = 2;
  string name = 3;
  string description = 4;
  repeated ProcessItemReq items = 5;
}

message CreateProcessDraftResp {
  int64 id = 1;
}

message UpdateProcessDraftReq {
  int64 id = 1;
  int64 ownerUserId = 2;
  int64 itemId = 3;
  string name = 4;
  string description = 5;
  repeated ProcessItemReq items = 6;
}

message UpdateProcessDraftResp {
  bool success = 1;
}

message DeleteProcessDraftReq {
  int64 id = 1;
}

message DeleteProcessDraftResp {
  bool success = 1;
}

message SubmitProcessReq {
  int64 id = 1;
}

message SubmitProcessResp {
  bool success = 1;
}

message GetProcessReq {
  int64 id = 1;
}

message GetProcessResp {
  ProcessInfo process = 1;
}

message ListProcessReq {
  int64 ownerUserId = 1;
  int64 itemId = 2;
  DraftStatus status = 3;
  int64 pageNum = 4;
  int64 pageSize = 5;
  string sinceTime = 6;
  int64 recentSeconds = 7;
  string cursorUpdatedAt = 8;
  int64 cursorId = 9;
  string namePrefix = 10;
  string itemNamePrefix = 11;
}

message ListProcessResp {
  repeated ProcessInfo processList = 1;
  int64 total = 2;
  bool hasMore = 3;
  string nextCursorUpdatedAt = 4;
  int64 nextCursorId = 5;
}

message AddItemUnitReq {
  int64 itemId = 1;
  StockStatus stockStatus = 2;
  QualityStatus qualityStatus = 3;
  string description = 4;
  int64 engineeringOrderId = 5;
}

message AddItemUnitResp {
  int64 id = 1;
}

message UpdateItemUnitStatusReq {
  int64 id = 1;
  StockStatus stockStatus = 2;
  QualityStatus qualityStatus = 3;
}

message UpdateItemUnitStatusResp {
  bool success = 1;
}

message GetItemUnitReq {
  int64 id = 1;
}

message GetItemUnitResp {
  ItemUnitInfo itemUnit = 1;
}

message ListItemUnitReq {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 itemId = 3;
  StockStatus stockStatus = 4;
  QualityStatus qualityStatus = 5;
  int64 engineeringOrderId = 6;
  int64 cursorId = 7;
  string itemNamePrefix = 8;
  int64 inventoryFlowId = 9;
  string cursorUpdatedAt = 10;
}

message ListItemUnitResp {
  repeated ItemUnitInfo itemUnitList = 1;
  int64 total = 2;
  bool hasMore = 3;
  int64 nextCursorId = 4;
  string nextCursorUpdatedAt = 5;
}

message InventoryFlowItemReq {
  int64 itemId = 1;
  int64 applyQuantity = 2;
}

message CreateInventoryFlowReq {
  int64 fromUserId = 1;
  int64 toUserId = 2;
  FlowType flowType = 3;
  string description = 4;
  repeated InventoryFlowItemReq items = 5;
  repeated int64 itemUnitIds = 6;
  string name = 7;
}

message CreateInventoryFlowResp {
  int64 id = 1;
}

message UpdateInventoryFlowDraftReq {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  FlowType flowType = 4;
  string description = 5;
  repeated InventoryFlowItemReq items = 6;
  repeated int64 itemUnitIds = 7;
  string name = 8;
}

message UpdateInventoryFlowDraftResp {
  bool success = 1;
}

message DeleteInventoryFlowDraftReq {
  int64 id = 1;
}

message DeleteInventoryFlowDraftResp {
  bool success = 1;
}

message SubmitInventoryFlowReq {
  int64 id = 1;
}

message SubmitInventoryFlowResp {
  bool success = 1;
}

message CompleteInventoryFlowReq {
  int64 id = 1;
  repeated int64 itemUnitIds = 2;
}

message CompleteInventoryFlowResp {
  bool success = 1;
}

message AuditInventoryFlowReq {
  int64 id = 1;
  int64 approvedBy = 2;
  bool approved = 3;
}

message AuditInventoryFlowResp {
  bool success = 1;
}

message GetInventoryFlowReq {
  int64 id = 1;
}

message GetInventoryFlowResp {
  InventoryFlowInfo inventoryFlow = 1;
}

message ListInventoryFlowReq {
  int64 userId = 1;
  bool isTo = 2;
  FlowStatus flowStatus = 3;
  int64 pageNum = 4;
  int64 pageSize = 5;
  string sinceTime = 6;
  int64 recentSeconds = 7;
  string cursorUpdatedAt = 8;
  int64 cursorId = 9;
  string namePrefix = 10;
  string itemNamePrefix = 11;
  ListScope scope = 12;
  int64 itemUnitId = 13;
}

message ListInventoryFlowResp {
  repeated InventoryFlowInfo inventoryFlowList = 1;
  int64 total = 2;
  bool hasMore = 3;
  string nextCursorUpdatedAt = 4;
  int64 nextCursorId = 5;
}

message CreateEngineeringOrderDraftReq {
  int64 leaderUserId = 1;
  int64 itemId = 2;
  int64 expectedQuantity = 3;
  int64 qualifiedQuantity = 4;
  string description = 5;
  int64 processId = 6;
  string name = 7;
}

message CreateEngineeringOrderDraftResp {
  int64 id = 1;
}

message UpdateEngineeringOrderDraftReq {
  int64 id = 1;
  int64 leaderUserId = 2;
  int64 itemId = 3;
  int64 expectedQuantity = 4;
  int64 qualifiedQuantity = 5;
  string description = 6;
  int64 processId = 7;
  string name = 8;
}

message UpdateEngineeringOrderDraftResp {
  bool success = 1;
}

message DeleteEngineeringOrderDraftReq {
  int64 id = 1;
}

message DeleteEngineeringOrderDraftResp {
  bool success = 1;
}

message SubmitEngineeringOrderReq {
  int64 id = 1;
}

message SubmitEngineeringOrderResp {
  bool success = 1;
}

message GetEngineeringOrderReq {
  int64 id = 1;
}

message GetEngineeringOrderResp {
  EngineeringOrderInfo engineeringOrder = 1;
}

message ListEngineeringOrderReq {
  int64 leaderUserId = 1;
  int64 itemId = 2;
  int64 pageNum = 3;
  int64 pageSize = 4;
  int64 processId = 5;
  DraftStatus status = 6;
  string sinceTime = 7;
  int64 recentSeconds = 8;
  string cursorUpdatedAt = 9;
  int64 cursorId = 10;
  string namePrefix = 11;
  string itemNamePrefix = 12;
}

message ListEngineeringOrderResp {
  repeated EngineeringOrderInfo engineeringOrderList = 1;
  int64 total = 2;
  bool hasMore = 3;
  string nextCursorUpdatedAt = 4;
  int64 nextCursorId = 5;
}

service InventoryService {
  rpc AddItem(AddItemReq) returns (AddItemResp);
  rpc UpdateItem(UpdateItemReq) returns (UpdateItemResp);
  rpc GetItem(GetItemReq) returns (GetItemResp);
  rpc ListItem(ListItemReq) returns (ListItemResp);

  rpc CreateProcessDraft(CreateProcessDraftReq) returns (CreateProcessDraftResp);
  rpc UpdateProcessDraft(UpdateProcessDraftReq) returns (UpdateProcessDraftResp);
  rpc DeleteProcessDraft(DeleteProcessDraftReq) returns (DeleteProcessDraftResp);
  rpc SubmitProcess(SubmitProcessReq) returns (SubmitProcessResp);
  rpc GetProcess(GetProcessReq) returns (GetProcessResp);
  rpc ListProcess(ListProcessReq) returns (ListProcessResp);

  rpc AddItemUnit(AddItemUnitReq) returns (AddItemUnitResp);
  rpc UpdateItemUnitStatus(UpdateItemUnitStatusReq) returns (UpdateItemUnitStatusResp);
  rpc GetItemUnit(GetItemUnitReq) returns (GetItemUnitResp);
  rpc ListItemUnit(ListItemUnitReq) returns (ListItemUnitResp);

  rpc CreateInventoryFlow(CreateInventoryFlowReq) returns (CreateInventoryFlowResp);
  rpc UpdateInventoryFlowDraft(UpdateInventoryFlowDraftReq) returns (UpdateInventoryFlowDraftResp);
  rpc DeleteInventoryFlowDraft(DeleteInventoryFlowDraftReq) returns (DeleteInventoryFlowDraftResp);
  rpc SubmitInventoryFlow(SubmitInventoryFlowReq) returns (SubmitInventoryFlowResp);
  rpc CompleteInventoryFlow(CompleteInventoryFlowReq) returns (CompleteInventoryFlowResp);
  rpc AuditInventoryFlow(AuditInventoryFlowReq) returns (AuditInventoryFlowResp);
  rpc GetInventoryFlow(GetInventoryFlowReq) returns (GetInventoryFlowResp);
  rpc ListInventoryFlow(ListInventoryFlowReq) returns (ListInventoryFlowResp);

  rpc CreateEngineeringOrderDraft(CreateEngineeringOrderDraftReq) returns (CreateEngineeringOrderDraftResp);
  rpc UpdateEngineeringOrderDraft(UpdateEngineeringOrderDraftReq) returns (UpdateEngineeringOrderDraftResp);
  rpc DeleteEngineeringOrderDraft(DeleteEngineeringOrderDraftReq) returns (DeleteEngineeringOrderDraftResp);
  rpc SubmitEngineeringOrder(SubmitEngineeringOrderReq) returns (SubmitEngineeringOrderResp);
  rpc GetEngineeringOrder(GetEngineeringOrderReq) returns (GetEngineeringOrderResp);
  rpc ListEngineeringOrder(ListEngineeringOrderReq) returns (ListEngineeringOrderResp);
}
