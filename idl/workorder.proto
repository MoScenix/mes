syntax = "proto3";

package workorder;

option go_package = "workorder";

enum WorkOrderStatus {
  WORK_ORDER_STATUS_UNKNOWN = 0;
  WORK_ORDER_STATUS_DRAFT = 1;
  WORK_ORDER_STATUS_SUBMITTED = 2;
}

message WorkOrderInfo {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  string description = 4;
  WorkOrderStatus status = 5;
  string createTime = 6;
  string updateTime = 7;
}

message CreateWorkOrderReq {
  int64 fromUserId = 1;
  int64 toUserId = 2;
  string description = 3;
}

message CreateWorkOrderResp {
  int64 id = 1;
}

message UpdateWorkOrderDraftReq {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  string description = 4;
}

message UpdateWorkOrderDraftResp {
  bool success = 1;
}

message DeleteWorkOrderDraftReq {
  int64 id = 1;
}

message DeleteWorkOrderDraftResp {
  bool success = 1;
}

message SubmitWorkOrderReq {
  int64 id = 1;
}

message SubmitWorkOrderResp {
  bool success = 1;
}

message GetWorkOrderReq {
  int64 id = 1;
}

message GetWorkOrderResp {
  WorkOrderInfo workOrder = 1;
}

message ListWorkOrderReq {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 fromUserId = 3;
  int64 toUserId = 4;
  WorkOrderStatus status = 5;
}

message ListWorkOrderResp {
  repeated WorkOrderInfo workOrderList = 1;
  int64 total = 2;
}

service WorkOrderService {
  rpc CreateWorkOrder(CreateWorkOrderReq) returns (CreateWorkOrderResp);
  rpc UpdateWorkOrderDraft(UpdateWorkOrderDraftReq) returns (UpdateWorkOrderDraftResp);
  rpc DeleteWorkOrderDraft(DeleteWorkOrderDraftReq) returns (DeleteWorkOrderDraftResp);
  rpc SubmitWorkOrder(SubmitWorkOrderReq) returns (SubmitWorkOrderResp);
  rpc GetWorkOrder(GetWorkOrderReq) returns (GetWorkOrderResp);
  rpc ListWorkOrder(ListWorkOrderReq) returns (ListWorkOrderResp);
}
