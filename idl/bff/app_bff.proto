syntax = "proto3";

package bff.app;

option go_package = "bff/app";

import "api.proto";

service AppService {

  rpc AddApp(AppAddRequest) returns (BaseResponseLong) {
    option (api.post) = "/app/add";
  }

  rpc DeleteApp(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/delete";
  }

  rpc UpdateApp(AppUpdateRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/update";
  }

  rpc GetAppVOById(GetAppVOByIdRequest) returns (BaseResponseAppVO) {
    option (api.get) = "/app/get/vo";
  }

  rpc ListMyAppVOByPage(AppQueryRequest) returns (BaseResponsePageAppVO) {
    option (api.post) = "/app/my/list/page/vo";
  }

  rpc ListGoodAppVOByPage(AppQueryRequest) returns (BaseResponsePageAppVO) {
    option (api.post) = "/app/good/list/page/vo";
  }

  rpc AddFile(AddFileRequest) returns (BaseResponseString) {
    option (api.post) = "/app/file/add";
  }

  rpc SubmitAI(AISubmitRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/ai/submit";
  }

  rpc PushAI(AIControlRequest) returns (BaseResponseString) {
    option (api.post) = "/app/ai/push";
  }

  rpc AnswerAI(AIControlRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/ai/answer";
  }

  rpc CancelAI(AIControlRequest) returns (BaseResponseString) {
    option (api.post) = "/app/ai/cancel";
  }

  rpc GetAIState(AIStateRequest) returns (BaseResponseAIState) {
    option (api.get) = "/app/ai/state";
  }

  rpc ListAIEvents(AIEventsRequest) returns (BaseResponseAIEvents) {
    option (api.get) = "/app/ai/events";
  }

  // 管理员分页查询聊天记录
  rpc ListAllChatHistoryByPageForAdmin(ChatHistoryQueryRequest) returns (BaseResponsePageChatHistory) {
    option (api.post) = "/chatHistory/admin/list/page/vo";
  }

  // 管理员删除聊天记录
  rpc DeleteChatHistoryByAdmin(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/chatHistory/admin/delete";
  }

  // 按应用分页查询聊天记录
  rpc ListAppChatHistory(ListAppChatHistoryRequest) returns (BaseResponsePageChatHistory) {
    option (api.get) = "/chatHistory/app/:appId";
  }

  rpc DeleteAppByAdmin(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/admin/delete";
  }

  rpc UpdateAppByAdmin(AppAdminUpdateRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/app/admin/update";
  }

  rpc GetAppVOByIdByAdmin(GetAppVOByIdByAdminRequest) returns (BaseResponseAppVO) {
    option (api.get) = "/app/admin/get/vo";
  }

  rpc ListAppVOByPageByAdmin(AppQueryRequest) returns (BaseResponsePageAppVO) {
    option (api.post) = "/app/admin/list/page/vo";
  }
}

message BaseResponseBoolean {
  int32 code = 1;
  bool data = 2;
  string message = 3;
}

message BaseResponseLong {
  int32 code = 1;
  int64 data = 2;
  string message = 3;
}

message BaseResponseString {
  int32 code = 1;
  string data = 2;
  string message = 3;
}

message BaseResponseAppVO {
  int32 code = 1;
  AppVO data = 2;
  string message = 3;
}

message BaseResponsePageAppVO {
  int32 code = 1;
  PageAppVO data = 2;
  string message = 3;
}

message BaseResponsePageChatHistory {
  int32 code = 1;
  PageChatHistory data = 2;
  string message = 3;
}

message BaseResponseAIState {
  int32 code = 1;
  AIState data = 2;
  string message = 3;
}

message BaseResponseAIEvents {
  int32 code = 1;
  AIEvents data = 2;
  string message = 3;
}

message DeleteRequest {
  int64 id = 1;
}

message AppAddRequest {
  string initPrompt = 1;
}

message AppUpdateRequest {
  int64 id = 1;
  string appName = 2;
}

message AppAdminUpdateRequest {
  int64 id = 1;
  string appName = 2;
}

message GetAppVOByIdRequest {
  int64 id = 1 [(api.query) = "id"];
}

message GetAppVOByIdByAdminRequest {
  int64 id = 1 [(api.query) = "id"];
}

message AISubmitRequest {
  int64 appId = 1;
  string message = 2;
}

message AIControlRequest {
  int64 appId = 1;
  string content = 2;
  string reason = 3;
  map<string, AIAnswer> answers = 5;
}

message AIAnswer {
  string content = 1;
  string payloadJson = 2;
}

message AIStateRequest {
  int64 appId = 1 [(api.query) = "appId"];
}

message AIEventsRequest {
  int64 appId = 1 [(api.query) = "appId"];
  string lastId = 2 [(api.query) = "lastId"];
  int64 blockMs = 3 [(api.query) = "blockMs"];
  int64 count = 4 [(api.query) = "count"];
}

message AppQueryRequest {
  int64 pageNum = 1;
  int64 pageSize = 2;
  string sortField = 3;
  string sortOrder = 4;
  int64 id = 5;
  string appName = 6;
  int64 userId = 12;
}

message ChatHistoryQueryRequest {
  int64 pageNum = 1;
  int64 pageSize = 2;
  string sortField = 3;
  string sortOrder = 4;
  int64 id = 5;
  string message = 6;
  string messageType = 7;
  int64 appId = 8;
  int64 userId = 9;
  string lastCreateTime = 10;
}

message ListAppChatHistoryRequest {
  int64 appId = 1 [(api.path) = "appId"];
  int64 pageSize = 2 [(api.query) = "pageSize"];
  string lastCreateTime = 3 [(api.query) = "lastCreateTime"];
}

message AppVO {
  int64 id = 1;
  string appName = 2;
  int64 userId = 9;
  string createTime = 10;
  string updateTime = 11;
  UserVO user = 12;
}

message UserVO {
  int64 id = 1;
  string userAccount = 2;
  string userName = 3;
  string userAvatar = 4;
  string userProfile = 5;
  string userRole = 6;
  string createTime = 7;
}

message ChatHistory {
  int64 id = 1;
  string message = 2;
  string messageType = 3;
  int64 appId = 4;
  int64 userId = 5;
  string createTime = 6;
  string updateTime = 7;
  int64 isDelete = 8;
  bool isFile = 9;
}

message AddFileRequest {
  int64 appId = 1;
}

message AIPendingInterrupt {
  string id = 1;
  string agent = 2;
  string content = 3;
  string payloadJson = 4;
}

message AIState {
  bool exists = 1;
  string status = 2;
  string agent = 3;
  string lastEventId = 4;
  string checkpointId = 5;
  repeated AIPendingInterrupt pendingInterrupts = 6;
  string message = 7;
  string buffer = 8;
  bool isCancelled = 9;
  int64 updatedAt = 10;
}

message AIEvent {
  string id = 1;
  string projectId = 2;
  string type = 3;
  string agent = 4;
  string content = 5;
  string targetId = 6;
  string name = 7;
  string status = 8;
  string payloadJson = 9;
  int64 createdAt = 10;
  repeated AIQuestion questions = 11;
}

message AIEvents {
  repeated AIEvent events = 1;
  string lastId = 2;
}

message AIQuestion {
  string question = 1;
  repeated string options = 2;
}

message PageAppVO {
  repeated AppVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
}

message PageChatHistory {
  repeated ChatHistory records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
}
