syntax = "proto3";

package bff.mes;

option go_package = "bff/mes";

import "api.proto";

service MesService {
  rpc CreateWorkOrderDraft(CreateWorkOrderDraftRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/work-order/draft/create";
  }

  rpc UpdateWorkOrderDraft(UpdateWorkOrderDraftRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/work-order/draft/update";
  }

  rpc DeleteWorkOrderDraft(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/work-order/draft/delete";
  }

  rpc SubmitWorkOrder(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/work-order/submit";
  }

  rpc GetWorkOrder(GetByIdRequest) returns (BaseResponseWorkOrderVO) {
    option (api.get) = "/mes/work-order/get";
  }

  rpc ListWorkOrder(ListWorkOrderRequest) returns (BaseResponsePageWorkOrderVO) {
    option (api.post) = "/mes/work-order/list";
  }

  rpc MarkWorkOrderRead(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/work-order/read";
  }

  rpc CreateProcessDraft(CreateProcessDraftRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/process/draft/create";
  }

  rpc UpdateProcessDraft(UpdateProcessDraftRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/process/draft/update";
  }

  rpc DeleteProcessDraft(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/process/draft/delete";
  }

  rpc SubmitProcess(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/process/submit";
  }

  rpc GetProcess(GetByIdRequest) returns (BaseResponseProcessVO) {
    option (api.get) = "/mes/process/get";
  }

  rpc ListProcess(ListProcessRequest) returns (BaseResponsePageProcessVO) {
    option (api.post) = "/mes/process/list";
  }

  rpc CreateEngineeringOrderDraft(CreateEngineeringOrderRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/engineering-order/draft/create";
  }

  rpc UpdateEngineeringOrderDraft(UpdateEngineeringOrderRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/engineering-order/draft/update";
  }

  rpc DeleteEngineeringOrderDraft(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/engineering-order/draft/delete";
  }

  rpc SubmitEngineeringOrder(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/engineering-order/submit";
  }

  rpc GetEngineeringOrder(GetByIdRequest) returns (BaseResponseEngineeringOrderVO) {
    option (api.get) = "/mes/engineering-order/get";
  }

  rpc ListEngineeringOrder(ListEngineeringOrderRequest) returns (BaseResponsePageEngineeringOrderVO) {
    option (api.post) = "/mes/engineering-order/list";
  }

  rpc AddItem(AddItemRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/item/add";
  }

  rpc UpdateItem(UpdateItemRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/item/update";
  }

  rpc GetItem(GetByIdRequest) returns (BaseResponseItemVO) {
    option (api.get) = "/mes/item/get";
  }

  rpc ListItem(ListItemRequest) returns (BaseResponsePageItemVO) {
    option (api.post) = "/mes/item/list";
  }

  rpc SearchItems(SearchItemsRequest) returns (BaseResponsePageItemVO) {
    option (api.get) = "/mes/item/search";
  }

  rpc AddItemUnit(AddItemUnitRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/item-unit/add";
  }

  rpc UpdateItemUnitStatus(UpdateItemUnitStatusRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/item-unit/status/update";
  }

  rpc GetItemUnit(GetByIdRequest) returns (BaseResponseItemUnitVO) {
    option (api.get) = "/mes/item-unit/get";
  }

  rpc ListItemUnit(ListItemUnitRequest) returns (BaseResponsePageItemUnitVO) {
    option (api.post) = "/mes/item-unit/list";
  }

  rpc CreateInventoryFlowDraft(CreateInventoryFlowDraftRequest) returns (BaseResponseLong) {
    option (api.post) = "/mes/inventory-flow/draft/create";
  }

  rpc UpdateInventoryFlowDraft(UpdateInventoryFlowDraftRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/inventory-flow/draft/update";
  }

  rpc DeleteInventoryFlowDraft(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/inventory-flow/draft/delete";
  }

  rpc SubmitInventoryFlow(DeleteRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/inventory-flow/submit";
  }

  rpc CompleteInventoryFlow(CompleteInventoryFlowRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/inventory-flow/complete";
  }

  rpc AuditInventoryFlow(AuditInventoryFlowRequest) returns (BaseResponseBoolean) {
    option (api.post) = "/mes/inventory-flow/audit";
  }

  rpc GetInventoryFlow(GetByIdRequest) returns (BaseResponseInventoryFlowVO) {
    option (api.get) = "/mes/inventory-flow/get";
  }

  rpc ListInventoryFlow(ListInventoryFlowRequest) returns (BaseResponsePageInventoryFlowVO) {
    option (api.post) = "/mes/inventory-flow/list";
  }
}

enum WorkOrderStatus {
  WORK_ORDER_STATUS_UNKNOWN = 0;
  WORK_ORDER_STATUS_DRAFT = 1;
  WORK_ORDER_STATUS_SUBMITTED = 2;
}

enum WorkOrderReadStatus {
  WORK_ORDER_READ_STATUS_UNKNOWN = 0;
  WORK_ORDER_READ_STATUS_UNREAD = 1;
  WORK_ORDER_READ_STATUS_READ = 2;
}

enum FlowType {
  FLOW_TYPE_UNKNOWN = 0;
  FLOW_TYPE_IN = 1;
  FLOW_TYPE_OUT = 2;
}

enum FlowStatus {
  FLOW_STATUS_UNKNOWN = 0;
  FLOW_STATUS_DRAFT = 1;
  FLOW_STATUS_SUBMITTED = 2;
  FLOW_STATUS_APPROVED = 3;
  FLOW_STATUS_REJECTED = 4;
}

enum StockStatus {
  STOCK_STATUS_UNKNOWN = 0;
  STOCK_STATUS_IN_STOCK = 1;
  STOCK_STATUS_RESERVED = 2;
  STOCK_STATUS_OUT_STOCK = 3;
}

enum QualityStatus {
  QUALITY_STATUS_UNKNOWN = 0;
  QUALITY_STATUS_PENDING = 1;
  QUALITY_STATUS_QUALIFIED = 2;
  QUALITY_STATUS_UNQUALIFIED = 3;
}

enum DraftStatus {
  DRAFT_STATUS_UNKNOWN = 0;
  DRAFT_STATUS_DRAFT = 1;
  DRAFT_STATUS_SUBMITTED = 2;
  DRAFT_STATUS_DONE = 3;
}

enum MesListScope {
  MES_LIST_SCOPE_UNSPECIFIED = 0;
  MES_LIST_SCOPE_MINE = 1;
  MES_LIST_SCOPE_ALL = 2;
  MES_LIST_SCOPE_AUDIT = 3;
  MES_LIST_SCOPE_BY_PROCESS = 4;
}

message BaseResponseBoolean {
  int32 code = 1;
  bool data = 2;
  string message = 3;
}

message BaseResponseLong {
  int32 code = 1;
  int64 data = 2;
  string message = 3;
}

message BaseResponseWorkOrderVO {
  int32 code = 1;
  WorkOrderVO data = 2;
  string message = 3;
}

message BaseResponsePageWorkOrderVO {
  int32 code = 1;
  PageWorkOrderVO data = 2;
  string message = 3;
}

message BaseResponseItemVO {
  int32 code = 1;
  ItemVO data = 2;
  string message = 3;
}

message BaseResponsePageItemVO {
  int32 code = 1;
  PageItemVO data = 2;
  string message = 3;
}

message BaseResponseItemUnitVO {
  int32 code = 1;
  ItemUnitVO data = 2;
  string message = 3;
}

message BaseResponsePageItemUnitVO {
  int32 code = 1;
  PageItemUnitVO data = 2;
  string message = 3;
}

message BaseResponseProcessVO {
  int32 code = 1;
  ProcessVO data = 2;
  string message = 3;
}

message BaseResponsePageProcessVO {
  int32 code = 1;
  PageProcessVO data = 2;
  string message = 3;
}

message BaseResponseEngineeringOrderVO {
  int32 code = 1;
  EngineeringOrderVO data = 2;
  string message = 3;
}

message BaseResponsePageEngineeringOrderVO {
  int32 code = 1;
  PageEngineeringOrderVO data = 2;
  string message = 3;
}

message BaseResponseInventoryFlowVO {
  int32 code = 1;
  InventoryFlowVO data = 2;
  string message = 3;
}

message BaseResponsePageInventoryFlowVO {
  int32 code = 1;
  PageInventoryFlowVO data = 2;
  string message = 3;
}

message DeleteRequest {
  int64 id = 1;
}

message GetByIdRequest {
  int64 id = 1 [(api.query) = "id"];
}

message CreateWorkOrderDraftRequest {
  int64 toUserId = 1;
  string description = 2;
  string name = 3;
}

message UpdateWorkOrderDraftRequest {
  int64 id = 1;
  int64 toUserId = 2;
  string description = 3;
  string name = 4;
}

message ListWorkOrderRequest {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 id = 3;
  bool isTo = 4;
  bool isUnread = 5;
  string sinceTime = 6;
  int64 recentSeconds = 7;
  string cursorUpdatedAt = 8;
  int64 cursorId = 9;
  string namePrefix = 10;
  WorkOrderStatus status = 11;
  MesListScope scope = 12;
}

message ProcessItemRequest {
  int64 consumeItemId = 1;
  int64 quantity = 2;
}

message CreateProcessDraftRequest {
  int64 ownerUserId = 1;
  int64 itemId = 2;
  string name = 3;
  string description = 4;
  repeated ProcessItemRequest items = 5;
}

message UpdateProcessDraftRequest {
  int64 id = 1;
  int64 ownerUserId = 2;
  int64 itemId = 3;
  string name = 4;
  string description = 5;
  repeated ProcessItemRequest items = 6;
}

message ListProcessRequest {
  int64 ownerUserId = 1;
  int64 itemId = 2;
  DraftStatus status = 3;
  int64 pageNum = 4;
  int64 pageSize = 5;
  string sinceTime = 6;
  int64 recentSeconds = 7;
  string cursorUpdatedAt = 8;
  int64 cursorId = 9;
  string namePrefix = 10;
  string itemNamePrefix = 11;
  MesListScope scope = 12;
}

message CreateEngineeringOrderRequest {
  int64 leaderUserId = 1;
  int64 itemId = 2;
  int64 expectedQuantity = 3;
  int64 qualifiedQuantity = 4;
  string description = 5;
  int64 processId = 6;
  string name = 7;
}

message UpdateEngineeringOrderRequest {
  int64 id = 1;
  int64 leaderUserId = 2;
  int64 itemId = 3;
  int64 expectedQuantity = 4;
  int64 qualifiedQuantity = 5;
  string description = 6;
  int64 processId = 7;
  string name = 8;
}

message ListEngineeringOrderRequest {
  int64 leaderUserId = 1;
  int64 itemId = 2;
  int64 pageNum = 3;
  int64 pageSize = 4;
  int64 processId = 5;
  DraftStatus status = 6;
  string sinceTime = 7;
  int64 recentSeconds = 8;
  string cursorUpdatedAt = 9;
  int64 cursorId = 10;
  string namePrefix = 11;
  string itemNamePrefix = 12;
  MesListScope scope = 13;
}

message AddItemRequest {
  string name = 1;
  string unit = 2;
  string description = 3;
}

message UpdateItemRequest {
  int64 id = 1;
  string name = 2;
  string unit = 3;
  string description = 4;
}

message ListItemRequest {
  int64 pageNum = 1;
  int64 pageSize = 2;
  string namePrefix = 3;
  string cursorUpdatedAt = 4;
  int64 cursorId = 5;
}

message SearchItemsRequest {
  string namePrefix = 1 [(api.query) = "namePrefix"];
  int64 pageNum = 2 [(api.query) = "pageNum"];
  int64 pageSize = 3 [(api.query) = "pageSize"];
  string cursorUpdatedAt = 4 [(api.query) = "cursorUpdatedAt"];
  int64 cursorId = 5 [(api.query) = "cursorId"];
}

message AddItemUnitRequest {
  int64 itemId = 1;
  StockStatus stockStatus = 2;
  QualityStatus qualityStatus = 3;
  string description = 4;
  int64 engineeringOrderId = 5;
}

message UpdateItemUnitStatusRequest {
  int64 id = 1;
  StockStatus stockStatus = 2;
  QualityStatus qualityStatus = 3;
}

message ListItemUnitRequest {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 itemId = 3;
  StockStatus stockStatus = 4;
  QualityStatus qualityStatus = 5;
  int64 engineeringOrderId = 6;
  int64 cursorId = 7;
  string itemNamePrefix = 8;
  MesListScope scope = 9;
  int64 inventoryFlowId = 10;
  string cursorUpdatedAt = 11;
}

message InventoryFlowItemRequest {
  int64 itemId = 1;
  int64 applyQuantity = 2;
}

message CreateInventoryFlowDraftRequest {
  int64 toUserId = 1;
  FlowType flowType = 2;
  string description = 3;
  repeated InventoryFlowItemRequest items = 4;
  repeated int64 itemUnitIds = 5;
  string name = 6;
}

message UpdateInventoryFlowDraftRequest {
  int64 id = 1;
  int64 toUserId = 2;
  FlowType flowType = 3;
  string description = 4;
  repeated InventoryFlowItemRequest items = 5;
  repeated int64 itemUnitIds = 6;
  string name = 7;
}

message AuditInventoryFlowRequest {
  int64 id = 1;
  bool approved = 2;
}

message CompleteInventoryFlowRequest {
  int64 id = 1;
  repeated int64 itemUnitIds = 2;
}

message ListInventoryFlowRequest {
  int64 userId = 1;
  bool isTo = 2;
  FlowStatus flowStatus = 3;
  int64 pageNum = 4;
  int64 pageSize = 5;
  string sinceTime = 6;
  int64 recentSeconds = 7;
  string cursorUpdatedAt = 8;
  int64 cursorId = 9;
  string namePrefix = 10;
  string itemNamePrefix = 11;
  MesListScope scope = 12;
  int64 itemUnitId = 13;
}

message WorkOrderVO {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  string description = 4;
  WorkOrderStatus status = 5;
  string createTime = 6;
  string updateTime = 7;
  WorkOrderReadStatus readStatus = 8;
  string name = 9;
}

message ItemVO {
  int64 id = 1;
  string name = 2;
  string unit = 3;
  string description = 4;
  int64 totalCount = 5;
  int64 inStockCount = 6;
  int64 reservedCount = 7;
  int64 outStockCount = 8;
  int64 pendingCount = 9;
  int64 qualifiedCount = 10;
  int64 unqualifiedCount = 11;
  int64 availableCount = 12;
  string createTime = 13;
  string updateTime = 14;
}

message ItemUnitVO {
  int64 id = 1;
  int64 itemId = 2;
  StockStatus stockStatus = 3;
  QualityStatus qualityStatus = 4;
  string description = 5;
  string createTime = 6;
  string updateTime = 7;
  int64 engineeringOrderId = 8;
}

message ProcessItemVO {
  int64 id = 1;
  int64 processId = 2;
  int64 consumeItemId = 3;
  int64 quantity = 4;
  ItemVO consumeItem = 5;
}

message ProcessVO {
  int64 id = 1;
  int64 itemId = 2;
  int64 ownerUserId = 3;
  string name = 4;
  string description = 5;
  DraftStatus status = 6;
  ItemVO item = 7;
  repeated ProcessItemVO items = 8;
  string createTime = 9;
  string updateTime = 10;
}

message EngineeringOrderVO {
  int64 id = 1;
  int64 leaderUserId = 2;
  int64 itemId = 3;
  ItemVO item = 4;
  int64 expectedQuantity = 5;
  int64 qualifiedQuantity = 6;
  int64 producedQuantity = 7;
  string description = 8;
  repeated ItemUnitVO itemUnits = 9;
  string createTime = 10;
  string updateTime = 11;
  int64 processId = 12;
  ProcessVO process = 13;
  DraftStatus status = 14;
  int64 unqualifiedQuantity = 15;
  string name = 16;
}

message InventoryFlowItemVO {
  int64 id = 1;
  int64 inventoryFlowId = 2;
  int64 itemId = 3;
  int64 applyQuantity = 4;
  int64 finishedQuantity = 5;
  ItemVO item = 6;
}

message InventoryFlowVO {
  int64 id = 1;
  int64 fromUserId = 2;
  int64 toUserId = 3;
  FlowType flowType = 4;
  FlowStatus flowStatus = 5;
  string description = 6;
  int64 approvedBy = 7;
  string approvedAt = 8;
  repeated InventoryFlowItemVO items = 9;
  repeated ItemUnitVO itemUnits = 10;
  string createTime = 11;
  string updateTime = 12;
  string name = 13;
}

message PageWorkOrderVO {
  repeated WorkOrderVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}

message PageItemVO {
  repeated ItemVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}

message PageItemUnitVO {
  repeated ItemUnitVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}

message PageProcessVO {
  repeated ProcessVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}

message PageEngineeringOrderVO {
  repeated EngineeringOrderVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}

message PageInventoryFlowVO {
  repeated InventoryFlowVO records = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 totalPage = 4;
  int64 totalRow = 5;
  bool optimizeCountQuery = 6;
  bool hasMore = 7;
  string nextCursorUpdatedAt = 8;
  int64 nextCursorId = 9;
}
